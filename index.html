<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capivara Clicker - Edição Paraná</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cenario-lago">
        
        <div id="painel-jogo">
            <h1>Capivara Clicker</h1>
            
            <div class="placar-infantil">
                <div class="moeda-gigante">🪙</div>
                <h2 id="txt-moedas">0</h2>
                <p>Cliques: +<span id="txt-por-clique">1</span> | Automático: +<span id="txt-por-segundo">0</span>/s</p>
            </div>

            <div id="area-clique">
                <div id="capivara-clicavel">
                    <svg viewBox="0 0 100 100" width="100%" height="100%">
                        <ellipse cx="50" cy="55" rx="35" ry="25" fill="#8B5A2B" />
                        <ellipse cx="70" cy="40" rx="18" ry="15" fill="#8B5A2B" />
                        <path d="M 75 35 Q 88 40 75 50" fill="#73421A" />
                        <ellipse cx="60" cy="30" rx="4" ry="6" fill="#5C3317" />
                        <circle cx="72" cy="36" r="2.5" fill="#000" />
                        <circle cx="73" cy="35" r="0.8" fill="#FFF" />
                        <rect x="30" y="70" width="8" height="12" rx="3" fill="#5C3317" />
                        <rect x="60" y="70" width="8" height="12" rx="3" fill="#5C3317" />
                    </svg>
                </div>
            </div>

            <div class="loja-infantil">
                <h3>🛍️ Lojinha da Capivara</h3>
                
                <div class="item-loja-card">
                    <div class="info-item">
                        <span class="icone-loja">🕶️</span>
                        <div>
                            <h4>Óculos Maneiro</h4>
                            <p>+1 por clique</p>
                        </div>
                    </div>
                    <button id="btn-upgrade-clique" onclick="comprarRoupinha()">
                        🪙 <span id="txt-custo-clique">10</span>
                    </button>
                </div>

                <div class="item-loja-card">
                    <div class="info-item">
                        <span class="icone-loja">🤖</span>
                        <div>
                            <h4>Capivara Robô</h4>
                            <p>+1 moeda por segundo</p>
                        </div>
                    </div>
                    <button id="btn-upgrade-auto" onclick="comprarEstagiaria()">
                        🪙 <span id="txt-custo-auto">50</span>
                    </button>
                </div>
            </div>

            <div style="margin-top: 15px;">
                <button class="btn-reset" onclick="resetarJogo()">🔄 Começar de Novo</button>
            </div>
        </div>

    </div>

    <script src="jogo.js"></script>
</body>
</html>
